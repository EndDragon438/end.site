<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>end.site</title>
<link href="/stylesheets/style.css" rel="stylesheet" type="text/css" media="all">
        <style>
            .tabList {
                display: flex;
                flex-flow: column nowrap;
                align-items: center;
                justify-content: center;
                padding: 0;
                width: fit-content;
                background-color: var(--background);
                border-radius: 5px;
            }
            
            .tabList.hTabs {
                flex-flow: row nowrap;
            }
            
            label.tab {
                color: var(--background);
                background-color: var(--foreground);
                border: solid 5px var(--background-lighter);
                border-radius: 5px;
                font-family: 'VCR OSD Mono';

                font-size: 2em;
                width: 6em;
                height: 2em;
                
                margin: 0.5em;

                text-align: center;
                align-content: center;
            }
            
            label.tab:hover, label.tab:checked {
                background-color: var(--foreground-light);
            }
            
            div.tab {
                display: none;
                background-color: greenyellow;
            }
            
            input.tab {
                display: none;
            }
            
            input:checked + div.tab {
                display: block;
            }
        </style>
    </head>
    <body>
        <nav class="tabList">
            <label class="tab" for="tab0">Tab 0</label>
            <label class="tab" for="tab1">Tab 1</label>
        </nav>
        <input type="radio" class="tab" id="tab0" name="tabs" checked>
        <div class="tab">
            Tab 0 contents
        </div>
        <input type="radio" class="tab" id="tab1" name="tabs">
        <div class="tab">
            Tab 1 contents
            <br>
            but longer now
        </div>
    </body>
</html>
